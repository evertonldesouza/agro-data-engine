name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths: [ 'src/frontend/**' ] 
    
permissions:
  contents: write
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          cd src/frontend
          npm install
          npm run build
        env:
          VITE_API_URL: https://agro-data-engine.onrender.com

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: src/frontend/dist
          branch: gh-pages